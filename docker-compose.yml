services:
  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fellaw-backend
    restart: unless-stopped
    environment:
      # Database - connects to existing postgres container
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fellaw

      # API Configuration
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: FelLaw
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost","http://frontend"]'

      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # AI Configuration (Optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fellaw-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - default

volumes:
  backend_uploads:
    driver: local

networks:
  default:
    name: psql_default
    external: true
