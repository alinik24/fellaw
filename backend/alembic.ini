# =============================================================================
# Alembic configuration file
# =============================================================================

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for new revision file names.
# %(rev)s  – short revision id
# %(slug)s – truncated revision message
# %(year)d, %(month).2d, %(day).2d, %(hour).2d, %(minute).2d, %(second).2d
file_template = %%(rev)s_%%(slug)s

# Truncate the slug to this many characters
truncate_slug_length = 40

# The default timezone for revision timestamps (shown in generated file header)
timezone = UTC

# Prepend sys.path with this directory so env.py can import the application
prepend_sys_path = .

# Version locations — a single directory is fine; multiple can be
# separated by spaces or newlines for branch-based migrations.
# version_locations = %(here)s/alembic/versions

# sqlalchemy.url is intentionally left as a placeholder.
# env.py reads the real URL from the DATABASE_URL environment variable
# so that the same migration script works both locally and inside Docker.
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

# =============================================================================
# Logging configuration — uses Python's standard logging.config.fileConfig()
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
